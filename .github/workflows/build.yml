name: 自动编译原生 APK 安装包

于:
  push:
    分支: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 编译 luci-app-cfiptools
    runs-on: ubuntu-22.04

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip time rsync python3 wget curl zstd

      - name: 获取 OpenWrt 官方原生快照 SDK
        run: |
          echo "==== 绕过动态防爬，直连 OpenWrt 官方底层服务器 ===="
          BASE_URL="https://downloads.openwrt.org/snapshots/targets/x86/64/"
          
          # 提取实时 SDK 文件名
          SDK_FILE=$(curl -sL "${BASE_URL}sha256sums" | grep 'openwrt-sdk' | awk '{print $2}' | sed 's/*//g' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "==== [致命错误] 未能在官方源中找到 SDK ===="
            exit 1
          fi
          
          echo "==== 成功锁定官方 SDK: $SDK_FILE ===="
          wget "${BASE_URL}${SDK_FILE}"
          tar -xf "$SDK_FILE"
          
          # 【核心修复点】先删除下载的压缩包，防止通配符匹配多个文件
          rm -f "$SDK_FILE"
          
          # 现在安心重命名唯一的文件夹
          mv openwrt-sdk-* sdk

      - name: 更新 Feeds 并安装 LuCI 依赖
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p luci

      - name: 将插件源码移入 SDK 车间
        run: |
          # 1. 在 SDK 的 package 目录下手动创建一个专属文件夹
          mkdir -p sdk/package/luci-app-cfiptools
          
          # 2. 用 rsync 把当前仓库里除了环境配置外的所有源码文件，全部装进这个文件夹里
          rsync -a --exclude='sdk' --exclude='.git' --exclude='.github' ./ sdk/package/luci-app-cfiptools/

      - name: 生成配置并开始定向编译
        run: |
          cd sdk
          make defconfig
          make package/luci-app-cfiptools/compile V=s

      - name: 提取并上传终极 APK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cfiptools-apk
          path: sdk/bin/packages/**/*.apk
          retention-days: 7
