name: 自动编译 ImmortalWrt APK

on:
  push:
    branches:
      - main  # 当你推送代码到 main 分支时自动触发
  workflow_dispatch: # 允许你在网页上手动点击按钮触发

jobs:
  build:
    name: 编译 luci-app-cfiptools
    runs-on: ubuntu-22.04

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置编译环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip time rsync python3 wget

      - name: 获取 ImmortalWrt 24.10 SDK
        run: |
          BASE_URL="https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/"
          
          # 1. 下载校验文件并动态提取 SDK 文件名
          SDK_FILE=$(curl -sL "${BASE_URL}sha256sums" | grep 'immortalwrt-sdk' | awk '{print $2}' | sed 's/^*//g' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "错误: 未能在官方源中找到 SDK 文件"
            exit 1
          fi
          
          echo "锁定最新 SDK: $SDK_FILE"
          
          # 2. 下载确切的文件
          wget "${BASE_URL}${SDK_FILE}"
          
          # 3. 自动识别并解压 (兼容 .tar.xz 与 .tar.zst)
          tar -xf "$SDK_FILE"
          
          # 4. 清理残留压缩包并重命名目录
          rm -f "$SDK_FILE"
          mv immortalwrt-sdk-* sdk

      - name: 将插件源码移入 SDK 车间
        run: |
          # 将仓库根目录下的 luci-app-cfiptools 复制到 SDK 的 package 目录中
          cp -r luci-app-cfiptools sdk/package/

      - name: 生成配置并开始编译
        run: |
          cd sdk
          make defconfig
          # 针对你的插件进行定向编译
          make package/luci-app-cfiptools/compile -j$(nproc) || make package/luci-app-cfiptools/compile -j1 V=s

      - name: 提取并上传 APK 安装包
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cfiptools-apk
          # 抓取生成的任意 apk 或 ipk 文件
          path: sdk/bin/packages/**/*.apk
          retention-days: 7