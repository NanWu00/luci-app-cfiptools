name: 自动编译 ImmortalWrt 安装包

on:
  push:
    branches: [ main ]
    paths:
      - 'luci-app-cfiptools/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: 编译 luci-app-cfiptools
    runs-on: ubuntu-22.04

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置编译环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk git libssl-dev \
            gettext zlib1g-dev swig unzip time rsync python3 wget curl zstd

      - name: 下载并校验 ImmortalWrt SDK
        run: |
          set -euo pipefail

          LATEST_VER=$(curl -sL https://downloads.immortalwrt.org/releases/ | \
                       grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | sort -Vu | tail -1)
          echo "检测到最新稳定版本: ${LATEST_VER}"

          BASE_URL="https://downloads.immortalwrt.org/releases/${LATEST_VER}/targets/x86/64/"

          wget "${BASE_URL}sha256sums"
          SDK_FILE=$(awk '/immortalwrt-sdk/ {print $2}' sha256sums | sed 's/^*//g' | head -1)
          echo "锁定 SDK 文件: ${SDK_FILE}"

          wget "${BASE_URL}${SDK_FILE}"
          grep "${SDK_FILE}" sha256sums | sha256sum -c --ignore-missing

          tar -xf "${SDK_FILE}"

          # 清理可能的同名文件/文件夹，避免冲突
          rm -rf sdk
          mv immortalwrt-sdk-* sdk

      - name: 准备编译环境（feeds 更新）
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p luci

      - name: 植入插件源码
        run: cp -r luci-app-cfiptools sdk/package/

      - name: 编译插件
        run: |
          cd sdk
          make package/luci-app-cfiptools/compile V=s

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cfiptools-package
          path: |
            sdk/bin/packages/**/*.apk
            sdk/bin/packages/**/*.ipk
          retention-days: 7
