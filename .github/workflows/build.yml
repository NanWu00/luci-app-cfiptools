name: 自动编译 ImmortalWrt 安装包

on:
  push:
    branches: [ main ]
    paths:
      - 'luci-app-cfiptools/**'
      - '.github/workflows/build.yml'   # 修改工作流自身时也触发
  workflow_dispatch:                    # 允许手动触发

jobs:
  build:
    name: 编译 luci-app-cfiptools
    runs-on: ubuntu-22.04

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置编译环境
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk git libssl-dev \
            gettext zlib1g-dev swig unzip time rsync python3 wget curl zstd

      - name: 下载并校验 ImmortalWrt SDK
        run: |
          # 开启调试输出，方便排查
          set -euxo pipefail

          # 1. 获取最新稳定版本号
          LATEST_VER=$(curl -sL https://downloads.immortalwrt.org/releases/ | \
                       grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | sort -Vu | tail -1)
          if [ -z "$LATEST_VER" ]; then
            echo "错误：未能检测到任何版本号"
            exit 1
          fi
          echo "检测到最新稳定版本: ${LATEST_VER}"

          # 2. 构建下载 URL
          BASE_URL="https://downloads.immortalwrt.org/releases/${LATEST_VER}/targets/x86/64/"

          # 3. 下载校验清单
          wget -O sha256sums "${BASE_URL}sha256sums" || { echo "下载 sha256sums 失败"; exit 1; }

          # 4. 从清单中提取 SDK 文件名（去掉可能的前导 *）
          SDK_FILE=$(awk '/immortalwrt-sdk/ {print $2}' sha256sums | sed 's/^*//g' | head -1)
          if [ -z "$SDK_FILE" ]; then
            echo "错误：在清单中未找到 immortalwrt-sdk 文件"
            exit 1
          fi
          echo "锁定 SDK 文件: ${SDK_FILE}"

          # 5. 下载 SDK
          wget "${BASE_URL}${SDK_FILE}" || { echo "下载 SDK 失败"; exit 1; }

          # 6. 校验哈希（从清单中提取对应行进行校验）
          grep "${SDK_FILE}" sha256sums | sha256sum -c --ignore-missing
          if [ $? -ne 0 ]; then
            echo "错误：SDK 校验失败，文件可能损坏"
            exit 1
          fi

          # 7. 获取解压后的顶层目录名（避免通配符歧义）
          TOP_DIR=$(tar -tf "${SDK_FILE}" | head -1 | cut -f1 -d"/")
          echo "解压后目录名: ${TOP_DIR}"

          # 8. 解压
          tar -xf "${SDK_FILE}"

          # 9. 清理并重命名为 sdk
          rm -rf sdk
          mv "${TOP_DIR}" sdk

      - name: 准备编译环境（更新 feeds）
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p luci

      - name: 植入插件源码
        run: |
          if [ ! -d "luci-app-cfiptools" ]; then
            echo "错误：未找到 luci-app-cfiptools 源码目录，请检查仓库结构"
            exit 1
          fi
          cp -r luci-app-cfiptools sdk/package/

      - name: 编译插件
        run: |
          cd sdk
          make package/luci-app-cfiptools/compile V=s

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cfiptools-package
          path: |
            sdk/bin/packages/**/*.apk
            sdk/bin/packages/**/*.ipk
          retention-days: 7
