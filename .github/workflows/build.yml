name: 自动编译原生 APK 安装包

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # 提前消除 Node.js 过时警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 编译 luci-app-cfiptools
    runs-on: ubuntu-22.04

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置编译环境
        run: |
          sudo apt-get update
          # 确保安装了 zstd，否则无法解压新版 ImmortalWrt SDK
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev swig unzip time rsync python3 wget curl zstd

      - name: 动态获取 ImmortalWrt 24.10 最新 SDK
        run: |
          BASE_URL="https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/"
          
          # 智能解析 sha256sums 获取最新文件名，彻底告别 404
          SDK_FILE=$(curl -sL "${BASE_URL}sha256sums" | grep 'immortalwrt-sdk' | awk '{print $2}' | sed 's/\*//g' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "==== [致命错误] 未能在官方源中找到 SDK ===="
            exit 1
          fi
          
          echo "==== 成功锁定官方 SDK: $SDK_FILE ===="
          wget "${BASE_URL}${SDK_FILE}"
          
          # 兼容解压 .tar.xz 和 .tar.zst
          tar -xf "$SDK_FILE"
          rm -f "$SDK_FILE"
          mv immortalwrt-sdk-* sdk

      - name: 核心步骤：更新 Feeds 基础组件树
        run: |
          cd sdk
          # 这一步绝不能少，它负责拉取 luci.mk 等所有底层依赖库！
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 智能收集插件源码并移入车间
        run: |
          mkdir -p sdk/package/luci-app-cfiptools
          rsync -a --exclude='sdk' --exclude='.git' --exclude='.github' ./ sdk/package/luci-app-cfiptools/

      - name: 生成配置并开始狂暴多核编译
        run: |
          cd sdk
          
          # 1. 强制选中插件
          echo "CONFIG_PACKAGE_luci-app-cfiptools=m" >> .config
          
          # 2. 【终极奥义】：强制 SDK 将打包格式从传统的 .ipk 切换为最新的 .apk！
          echo "CONFIG_USE_APK=y" >> .config
          
          make defconfig
          
          # 3. 使用 USE_APK=1 作为环境变量双重保险，火力全开！
          make package/luci-app-cfiptools/compile USE_APK=1 -j$(nproc) || make package/luci-app-cfiptools/compile USE_APK=1 -j1 V=s

      - name: 提取并上传终极安装包
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cfiptools-package
          # 【天罗地网】：不管是 apk 还是 ipk，只要编译出来统统抓走
          path: |
            sdk/bin/packages/**/*.apk
            sdk/bin/packages/**/*.ipk
          retention-days: 7